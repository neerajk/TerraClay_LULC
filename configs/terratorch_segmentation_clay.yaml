seed_everything: 42

trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 60
  log_every_n_steps: 10
  default_root_dir: outputs/terratorch_clay
  callbacks:
    - class_path: RichProgressBar
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: ModelCheckpoint
      init_args:
        monitor: val/mIoU
        mode: max
        save_top_k: 3
        save_last: true
        filename: clay-{epoch:02d}-{val/mIoU:.4f}
    - class_path: EarlyStopping
      init_args:
        monitor: val/mIoU
        mode: max
        patience: 12
        min_delta: 0.0005

data:
  class_path: terratorch.datamodules.GenericNonGeoSegmentationDataModule
  init_args:
    batch_size: 8
    num_workers: 4
    pin_memory: true
    num_classes: 20
    train_data_root: data/processed/tiles/train/images
    train_label_data_root: data/processed/tiles/train/masks
    val_data_root: data/processed/tiles/val/images
    val_label_data_root: data/processed/tiles/val/masks
    test_data_root: data/processed/tiles/test/images
    test_label_data_root: data/processed/tiles/test/masks
    img_grep: '*.tif'
    label_grep: '*.tif'
    dataset_bands:
      - BLUE
      - GREEN
      - RED
      - NIR_NARROW
      - SWIR_1
      - SWIR_2
    output_bands:
      - BLUE
      - GREEN
      - RED
      - NIR_NARROW
      - SWIR_1
      - SWIR_2
    rgb_indices: [2, 1, 0]
    means: configs/stats/terratorch_segmentation_clay_template.landsat-c2-l2.means.txt
    stds: configs/stats/terratorch_segmentation_clay_template.landsat-c2-l2.stds.txt
    no_data_replace: 0
    no_label_replace: 0
    reduce_zero_label: false
    train_transform:
      - class_path: albumentations.HorizontalFlip
        init_args:
          p: 0.5
      - class_path: albumentations.VerticalFlip
        init_args:
          p: 0.5
      - class_path: albumentations.Rotate
        init_args:
          limit: 30
          border_mode: 0
          value: 0
          mask_value: 0
          p: 0.3
      - class_path: ToTensorV2
    val_transform:
      - class_path: ToTensorV2
    test_transform:
      - class_path: ToTensorV2

model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: ClayModelFactory
    model_args:
      backbone: clay_v1.5            # Clay v1.5 encoder
      backbone_ckpt: /path/to/clay-v1.5.ckpt   # UPDATE THIS PATH
      in_channels: 6
      num_classes: 20
      decoder: UNetDecoder
      decoder_channels: [512, 256, 128, 64]
      head_dropout: 0.1
    loss:
      ce: 0.7
      dice: 0.3
    ignore_index: 0
    freeze_backbone: true            # train decoder only first
    freeze_decoder: false
    tiled_inference_parameters:
      crop: 224
      stride: 192
      average_patches: true
      blend_overlaps: true
    output_on_inference: prediction

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.0002
    weight_decay: 0.0001

lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/mIoU
    mode: max
    factor: 0.5
    patience: 4
