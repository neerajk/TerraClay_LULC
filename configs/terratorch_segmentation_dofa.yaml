seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  logger: true
  callbacks:
  - class_path: RichProgressBar
  - class_path: LearningRateMonitor
    init_args:
      logging_interval: epoch
  - class_path: ModelCheckpoint
    init_args:
      monitor: val/mIoU
      mode: max
      save_top_k: 3
      save_last: true
      filename: best-{epoch:02d}-{val_mIoU:.4f}
  - class_path: EarlyStopping
    init_args:
      monitor: val/mIoU
      mode: max
      patience: 12
  max_epochs: 60
  log_every_n_steps: 20
  enable_checkpointing: true
  default_root_dir: outputs/terratorch_runs_dofa

data:
  class_path: terratorch.datamodules.GenericNonGeoSegmentationDataModule
  init_args:
    batch_size: 8
    num_workers: 4
    pin_memory: true
    num_classes: 20
    train_data_root: data/processed/tiles/train/images
    train_label_data_root: data/processed/tiles/train/masks
    val_data_root: data/processed/tiles/val/images
    val_label_data_root: data/processed/tiles/val/masks
    test_data_root: data/processed/tiles/test/images
    test_label_data_root: data/processed/tiles/test/masks
    img_grep: '*.tif'
    label_grep: '*.tif'
    dataset_bands:
    - BLUE
    - GREEN
    - RED
    - NIR_NARROW
    - SWIR_1
    - SWIR_2
    output_bands:
    - BLUE
    - GREEN
    - RED
    - NIR_NARROW
    - SWIR_1
    - SWIR_2
    rgb_indices:
    - 2
    - 1
    - 0
    means: configs/stats/terratorch_segmentation.landsat-c2-l2.means.txt
    stds: configs/stats/terratorch_segmentation.landsat-c2-l2.stds.txt
    no_data_replace: 0
    no_label_replace: 0
    reduce_zero_label: false
    check_stackability: true
    train_transform:
    - class_path: albumentations.HorizontalFlip
      init_args:
        p: 0.5
    - class_path: albumentations.VerticalFlip
      init_args:
        p: 0.5
    - class_path: ToTensorV2
    val_transform:
    - class_path: ToTensorV2
    test_transform:
    - class_path: ToTensorV2

model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: terratorch_dofa_base_patch16_224
      backbone_pretrained: true
      backbone_bands:
      - BLUE
      - GREEN
      - RED
      - NIR_NARROW
      - SWIR_1
      - SWIR_2
      necks:
      - name: SelectIndices
        indices:
        - 2
        - 5
        - 8
        - 11
      - name: ReshapeTokensToImage
      - name: LearnedInterpolateToPyramidal
      decoder: UNetDecoder
      decoder_channels:
      - 512
      - 256
      - 128
      - 64
      head_dropout: 0.1
      num_classes: 20
    loss:
      ce: 0.7
      dice: 0.3
    ignore_index: 0
    freeze_backbone: false
    freeze_decoder: false
    tiled_inference_parameters:
      crop: 224
      stride: 192
      average_patches: true
      blend_overlaps: true
    output_on_inference: prediction

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.0002
    weight_decay: 0.0001

lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/mIoU
    mode: max
    factor: 0.5
    patience: 4
